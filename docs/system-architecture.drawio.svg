<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1100px" height="780px" viewBox="-0.5 -0.5 1100 780" style="background-color: rgb(255, 255, 255);">

  <!-- Title -->
